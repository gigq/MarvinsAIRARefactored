<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8"/>
		<meta name="viewport" content="width=device-width, initial-scale=1"/>
		<title>Help - Marvin's Awesome iRacing App</title>

		<!-- Your existing CSS -->
		<link rel="stylesheet" href="help.css"/>

		<!-- Marked.js – full Markdown support (tables, images, HTML, code blocks) -->
		<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

		<style>
            table {
                width: 100%;
                border-collapse: collapse;
                margin: 1rem 0;
            }

            table th, table td {
                border: 1px solid #CCC;
                padding: 6px 10px;
            }

            pre code {
                font-family: Consolas, monospace;
                padding: 10px;
                display: block;
                background: #f3f3f3;
                border-radius: 6px;
                overflow-x: auto;
            }

            img {
                max-width: 100%;
                height: auto;
            }
		</style>
	</head>

	<body>
		<main class="container">
			<article class="article">
				<section class="section">
					<div id="markdownContent">Loading documentation…</div>
				</section>
			</article>
		</main>

		<script>
			// 1. Get page from query string, if present (e.g. /help?page=test)
			var urlParameters = new URLSearchParams( window.location.search );
			var pageFromQuery = urlParameters.get( "page" );

			// 2. Try to get page from the path, e.g. /help/test → "test"
			var pathSegments = window.location.pathname.split( "/" ).filter( Boolean );
			var pageFromPath = null;

			if ( pathSegments.length >= 2 )
			{
				// For /help/test → ["help","test"], last segment is "test"
				var lastSegment = pathSegments[ pathSegments.length - 1 ];

				// Ignore .html files like /help/index.html or /help/help.html
				if ( !lastSegment.toLowerCase().endsWith( ".html" ) )
				{
					pageFromPath = lastSegment;
				}
			}

			// 3. Decide final page name:
			//    - Prefer explicit ?page=...
			//    - Then /help/<slug>
			//    - Then fallback default
			var pageName = pageFromQuery || pageFromPath || "could-not-find-page-from-query-or-path";

			// 4. Update visible title if you want
			var pageTitleElement = document.getElementById( "pageTitle" );
			if ( pageTitleElement )
			{
				pageTitleElement.textContent = pageName.replace( /-/g, " " );
			}

			// 5. Fetch and render the markdown
			var markdownContentElement = document.getElementById( "markdownContent" );
			var markdownFilePath = "pages/" + pageName + ".md";

			fetch( markdownFilePath )
				.then( function ( response )
				{
					if ( !response.ok )
					{
						throw new Error( "Markdown file not found: " + markdownFilePath );
					}
					return response.text();
				} )
				.then( function ( markdownText )
				{
					var htmlContent = marked.parse( markdownText );
					markdownContentElement.innerHTML = htmlContent;
				} )
				.catch( function ( error )
				{
					markdownContentElement.innerHTML =
						"<p>That help page could not be loaded (404).</p><pre>" +
						error.message +
						"</pre>";
				} );
		</script>
	</body>
</html>
